[build]
  base = "mfe-policy-dashboard"
  command = "npm run build"
  publish = "dist/mfe-policy-dashboard"

[[headers]]
  for = "/remoteEntry.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "no-cache"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
